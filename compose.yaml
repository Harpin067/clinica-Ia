services:
  db:
    image: postgres:15-alpine
    container_name: clinica_db
    environment:
      POSTGRES_DB: clinica_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_init/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - clinica-network

  backend:
    build: .
    container_name: clinica_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/clinica_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
    networks:
      - clinica-network

  ml-service:
    build: ./ml_analytics
    container_name: clinica_ml
    environment:
      DB_HOST: db
      DB_NAME: clinica_db
      DB_USER: postgres
      DB_PASS: password123
    depends_on:
      - db
    volumes:
      - ./ml_analytics:/app
    networks:
      - clinica-network

volumes:
  postgres_data:

networks:
  clinica-network:
    driver: bridge
