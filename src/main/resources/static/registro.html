<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediML - Registro de Expediente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl z-20">
        <div class="h-20 flex items-center justify-center font-bold text-2xl border-b border-slate-800 tracking-wider">
            <i class="fa-solid fa-heart-pulse text-rose-500 mr-3"></i> Medi<span class="text-blue-400">ML</span>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-3">
            <a href="dashboard.html" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-xl transition-all"><i class="fa-solid fa-chart-line w-6"></i> Panel Predictivo</a>
            <a href="registro.html" class="flex items-center px-4 py-3 bg-blue-600 rounded-xl shadow-lg shadow-blue-600/20 transition-all"><i class="fa-solid fa-user-plus w-6"></i> Nuevo Expediente</a>
            <a href="agendar.html" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-xl transition-all"><i class="fa-solid fa-plus w-6"></i> Agendar Cita</a>
            <a href="agenda.html" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-xl transition-all"><i class="fa-regular fa-calendar-check w-6"></i> Agenda Operativa</a>
            <a href="historial.html" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-xl transition-all"><i class="fa-solid fa-folder-open w-6"></i> Historial Médico</a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold" id="user-avatar">--</div>
                <div class="text-sm">
                    <p class="font-bold" id="user-name">Cargando...</p>
                    <p class="text-slate-400 text-xs">Administrador</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto relative">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-10 flex items-center justify-between px-10">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Apertura de Expediente y Triaje</h1>
                <p class="text-sm text-slate-500">Captura de datos limpios para modelo predictivo de salud</p>
            </div>
        </header>

        <div class="p-10">
            <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <form id="pacienteForm" onsubmit="submitForm(event)" class="p-8">
                    
                    <div class="mb-10">
                        <h2 class="text-lg font-bold text-slate-800 mb-6 flex items-center"><span class="bg-blue-100 text-blue-600 w-8 h-8 rounded-full flex items-center justify-center mr-3 text-sm">1</span> Datos Demográficos</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-slate-50 p-6 rounded-xl border border-gray-100">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Nombre Completo</label>
                                <input type="text" id="nombreCompleto" name="nombreCompleto" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white" placeholder="Ej. Juan Pérez" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Fecha de Nacimiento</label>
                                <input type="date" name="fechaNacimiento" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white text-slate-600" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Sexo Biológico</label>
                                <select name="sexo" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white">
                                    <option value="M">Masculino</option>
                                    <option value="F">Femenino</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mb-10">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-bold text-slate-800 flex items-center"><span class="bg-rose-100 text-rose-600 w-8 h-8 rounded-full flex items-center justify-center mr-3 text-sm">2</span> Features Médicos (Input ML)</h2>
                            <span class="bg-indigo-50 text-indigo-600 text-xs font-bold px-3 py-1 rounded-full border border-indigo-100"><i class="fa-solid fa-database mr-1"></i> Formato Numérico</span>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 bg-white p-6 rounded-xl border-2 border-dashed border-rose-100">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Peso (kg)</label>
                                <input type="number" step="0.1" name="peso" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-rose-500" placeholder="85.5" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Talla (cm)</label>
                                <input type="number" name="talla" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-rose-500" placeholder="175" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">P. Sistólica (Alta)</label>
                                <input type="number" name="presionSistolica" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-rose-500" placeholder="120" required>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">P. Diastólica (Baja)</label>
                                <input type="number" name="presionDiastolica" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-rose-500" placeholder="80" required>
                            </div>

                            <div class="md:col-span-4 grid grid-cols-3 gap-4 mt-4 p-4 bg-gray-50 rounded-lg">
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" name="fumador" value="true" class="w-4 h-4 text-rose-600 rounded">
                                    <span class="text-sm text-slate-700 font-medium">Paciente Fumador</span>
                                </label>
                                <label class="flex items-center gap-2 cursor-pointer">
                                    <input type="checkbox" name="antecedentesDiabetes" value="true" class="w-4 h-4 text-rose-600 rounded">
                                    <span class="text-sm text-slate-700 font-medium">Historial Familiar Diabetes</span>
                                </label>
                                <select name="actividadFisica" class="text-sm border border-gray-200 rounded-lg p-2">
                                    <option value="sedentario">Estilo: Sedentario</option>
                                    <option value="moderado">Estilo: Moderado</option>
                                    <option value="activo">Estilo: Activo</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end space-x-4 border-t border-gray-100 pt-6">
                        <button type="button" onclick="window.location.href='dashboard.html'" class="px-6 py-2.5 border border-gray-200 rounded-lg text-slate-600 hover:bg-gray-50 font-semibold transition-colors">Cancelar</button>
                        <button type="submit" id="submitBtn" class="px-6 py-2.5 bg-blue-600 rounded-lg text-white hover:bg-blue-700 font-bold shadow-lg shadow-blue-600/30 transition-all flex items-center">
                            <i class="fa-solid fa-microchip mr-2"></i> Guardar y Predecir Riesgo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loggedUser = localStorage.getItem('loggedUser');
            if(loggedUser) {
                document.getElementById('user-name').innerText = "Dr. " + loggedUser;
                document.getElementById('user-avatar').innerText = loggedUser.substring(0,2).toUpperCase();
            }
        });

        // NUEVA FUNCIÓN: Conexión real con Spring Boot
        async function submitForm(event) {
            event.preventDefault(); // Evita que la página recargue
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            const form = event.target;

            // 1. Recolectar datos del formulario
            const formData = new FormData(form);
            const dataObj = {};
            
            formData.forEach((value, key) => {
                // Manejar números y booleanos correctamente para el JSON
                if (key === 'peso' || key === 'talla' || key === 'presionSistolica' || key === 'presionDiastolica') {
                    dataObj[key] = value ? Number(value) : null;
                } else if (key === 'fumador' || key === 'antecedentesDiabetes') {
                    dataObj[key] = value === 'true';
                } else {
                    dataObj[key] = value;
                }
            });

            // Forzar falsos para checkboxes no marcados (FormData los omite por defecto)
            dataObj.fumador = form.querySelector('[name="fumador"]').checked;
            dataObj.antecedentesDiabetes = form.querySelector('[name="antecedentesDiabetes"]').checked;

            // UI Feedback: Botón cargando
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Procesando...';
            btn.disabled = true;

            try {
                // 2. Hacer la petición POST al backend Spring Boot
                // Asegúrate de que tu app Spring Boot esté corriendo en localhost:8080
                const response = await fetch('http://localhost:8080/api/expedientes/registrar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dataObj)
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    // 3. Mostrar el resultado (incluyendo el Mock de ML)
                    alert(`¡Éxito! Expediente Guardado (ID: ${result.idPaciente})\n\nPredicción AI: ${result.prediccionML}`);
                    
                    // Redirigir o limpiar formulario
                    window.location.href = 'dashboard.html';
                } else {
                    const err = await response.json();
                    throw new Error(err.error || 'Error al guardar en el servidor');
                }
            } catch (error) {
                console.error("Error en la petición:", error);
                alert("Ocurrió un error al conectar con el servidor: " + error.message);
                
                // Restaurar botón si falla
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
